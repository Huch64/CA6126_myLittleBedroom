                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{items.map(function(it){var d=gfp(it.sp,ori),on=sel===it.idx;return <button key={it.idx} onClick={function(){if(!catBlocked) setSel(on?null:it.idx);}} className="btn" style={{padding:"4px 6px",borderRadius:4,background:on?c+"20":"transparent",color:on?"#222":"#888",fontSize:11,fontWeight:on?600:400,display:"flex",alignItems:"center",gap:3,cursor:catBlocked?"not-allowed":"pointer"}}><Thumb w={it.sp.w} h={it.sp.h} color={c}/><div><div>{it.sp.n}</div><div style={{fontSize:8,color:"#bbb"}}>{(d.w*GRID).toFixed(2)+"\u00d7"+(d.h*GRID).toFixed(2)}</div></div></button>;})}</div></div>;})}
          </div>
          {pl.length>0&&<div className="card"><div className="card-title">Placed</div>{pl.map(function(p){return <div key={p.id} style={{fontSize:10,color:"#777",padding:"2px 0",display:"flex",alignItems:"center",gap:5}}><div style={{width:5,height:5,borderRadius:1.5,background:CC[CAT[p.fid].c]}}/><span>{CAT[p.fid].n}</span><span style={{color:"#ccc",fontSize:8}}>{"("+p.x+","+p.y+") "+["\u2191","\u2192","\u2193","\u2190"][p.ori]}</span></div>;})}</div>}
        </div>
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
